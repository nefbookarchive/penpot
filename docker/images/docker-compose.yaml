version: "3.9"

networks:
  xenpot:

volumes:
  xenpot_postgres_v15:
  xenpot_assets:

services:

  xenpot-frontend:
    build:
      context: ../../
      dockerfile: docker/images/Dockerfile.frontend
    restart: always
    ports:
      - "9001:8080"
    volumes:
      - xenpot_assets:/opt/data/assets
    depends_on:
      - xenpot-backend
      - xenpot-exporter
    networks:
      - xenpot
    environment:
      XENPOT_FLAGS: disable-email-verification enable-smtp enable-prepl-server disable-secure-session-cookies
      XENPOT_PUBLIC_URI: http://localhost:9001

  xenpot-backend:
    build:
      context: ../../
      dockerfile: docker/images/Dockerfile.backend
    restart: always
    volumes:
      - xenpot_assets:/opt/data/assets
    depends_on:
      xenpot-postgres:
        condition: service_healthy
      xenpot-redis:
        condition: service_healthy
    networks:
      - xenpot
    environment:
      XENPOT_DATABASE_URI: postgresql://xenpot-postgres/xenpot
      XENPOT_DATABASE_USERNAME: xenpot
      XENPOT_DATABASE_PASSWORD: YourSecurePassword123
      XENPOT_REDIS_URI: redis://xenpot-redis/0
      XENPOT_ASSETS_STORAGE_BACKEND: assets-fs
      XENPOT_STORAGE_ASSETS_FS_DIRECTORY: /opt/data/assets
      XENPOT_SMTP_HOST: localhost
      XENPOT_SMTP_PORT: 1025
      XENPOT_SMTP_USERNAME: ""
      XENPOT_SMTP_PASSWORD: ""
      XENPOT_SMTP_TLS: false
      XENPOT_SMTP_SSL: false
      XENPOT_TELEMETRY_ENABLED: true

  xenpot-exporter:
    build:
      context: ../../
      dockerfile: docker/images/Dockerfile.exporter
    restart: always
    networks:
      - xenpot
    environment:
      XENPOT_PUBLIC_URI: http://xenpot-frontend:8080
      XENPOT_REDIS_URI: redis://xenpot-redis/0

  xenpot-postgres:
    image: "postgres:15"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xenpot"]
      interval: 2s
      timeout: 10s
      retries: 5
      start_period: 2s
    volumes:
      - xenpot_postgres_v15:/var/lib/postgresql/data
    networks:
      - xenpot
    environment:
      POSTGRES_DB: xenpot
      POSTGRES_USER: xenpot
      POSTGRES_PASSWORD: YourSecurePassword123

  xenpot-redis:
    image: redis:7.2
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5
      start_period: 3s
    networks:
      - xenpot
